# Example nginx config for production deployment.
# Place in /etc/nginx/sites-available/worker-zydrunas and symlink to sites-enabled/.
# Replace YOUR_DOMAIN and paths as needed.

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL — obtain with: certbot --nginx -d YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Vue frontend (built static files)
    root /var/www/worker-zydrunas/frontend/dist;
    index index.html;

    # All non-API routes → Vue SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → gunicorn
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Basic rate limiting (complement to Flask-Limiter)
        limit_req zone=api burst=20 nodelay;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

# Rate limit zone (add to http {} block in /etc/nginx/nginx.conf)
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
